# ─── Grafana Dashboard Provisioning ───────────────────────────────────
# Tells Grafana to auto-load all JSON dashboards from the mounted directory.

apiVersion: 1

providers:
  - name: 'Default'
    orgId: 1
    folder: 'Monitoring'
    folderUid: 'monitoring'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

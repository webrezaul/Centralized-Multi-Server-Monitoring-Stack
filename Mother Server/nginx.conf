events {
    worker_connections 1024;
}

http {
    # ── Rate limiting for push endpoints ──────────────────────────────
    # 10 requests/sec per IP with burst of 20 — prevents runaway agents
    limit_req_zone $binary_remote_addr zone=push_limit:10m rate=10r/s;

    upstream prometheus { server prometheus:9090; }
    upstream loki       { server loki:3100; }
    upstream grafana    { server grafana:3000; }
    upstream alertmgr   { server alertmanager:9093; }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────
    server {
        listen 80;
        server_name grafana.mdrezaulkarim.com;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name grafana.mdrezaulkarim.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── Security headers ──────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Grafana UI ────────────────────────────────────────────────
        # Grafana has its own login, no extra auth needed here
        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Grafana Live
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # ── Prometheus remote_write ingestion ─────────────────────────
        # Agents push metrics here; basic auth required
        location /api/v1/write {
            auth_basic "Metrics ingestion";
            auth_basic_user_file /etc/nginx/htpasswd;

            limit_req zone=push_limit burst=20 nodelay;

            proxy_pass http://prometheus;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # remote_write payloads can be large for batched sends
            client_max_body_size 10m;
        }

        # ── Loki push endpoint ────────────────────────────────────────
        # Promtail pushes logs here; basic auth required
        location /loki/api/v1/push {
            auth_basic "Log ingestion";
            auth_basic_user_file /etc/nginx/htpasswd;

            limit_req zone=push_limit burst=20 nodelay;

            proxy_pass http://loki;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            client_max_body_size 10m;
        }

        # ── Alertmanager API ──────────────────────────────────────────
        # Accessible from Grafana for alert management UI
        location /alertmanager/ {
            auth_basic "Alertmanager";
            auth_basic_user_file /etc/nginx/htpasswd;

            proxy_pass http://alertmgr/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'central'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus scrapes itself for internal health metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape mother server node-exporter directly
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          server: 'mother-server'

  # Scrape mother server cAdvisor directly
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          server: 'mother-server'

# ──────────────────────────────────────────────────────────────────────
# No additional scrape_configs needed for the 2 other agent servers.
# They push their own metrics via remote_write (see Child server 1/prometheus-agent.yml),
# tagged with a "server" label so they're distinguishable in Grafana.
# ──────────────────────────────────────────────────────────────────────

# ─── Prometheus Agent — Server 3 (Generic VPS) ───────────────────────
# Scrapes local node_exporter + cAdvisor, pushes to central Prometheus

global:
  scrape_interval: 15s
  external_labels:
    server: '${SERVER_NAME}'

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

remote_write:
  - url: '${CENTRAL_URL}/api/v1/write'
    basic_auth:
      username: '${AUTH_USER}'
      password: '${AUTH_PASS}'
    queue_config:
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      max_retries: 10

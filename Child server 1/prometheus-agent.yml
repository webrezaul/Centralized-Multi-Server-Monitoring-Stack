# ─── Prometheus Agent — Hostinger VPS ─────────────────────────────────
# Scrapes local node_exporter + cAdvisor, pushes to central Prometheus

global:
  scrape_interval: 15s
  external_labels:
    server: 'hostinger-1'

scrape_configs:
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

remote_write:
  - url: 'https://grafana.mdrezaulkarim.com/api/v1/write'
    basic_auth:
      username: 'agent_user'
      password: 'CHANGE_ME'
    queue_config:
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      max_retries: 10
